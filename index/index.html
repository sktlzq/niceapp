<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ИИ-чат</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  /* ─── Reset & Variables ─── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --surface: #f4f4f5;
    --text: #18181b;
    --subtext: #71717a;
    --accent: #6366f1;
    --accent-hover: #4f46e5;
    --user-bubble: #6366f1;
    --user-text: #ffffff;
    --ai-bubble: #f4f4f5;
    --ai-text: #18181b;
    --border: #e4e4e7;
    --shadow: 0 2px 8px rgba(0,0,0,.08);
    --radius: 18px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  body.dark {
    --bg: #09090b;
    --surface: #18181b;
    --text: #fafafa;
    --subtext: #a1a1aa;
    --ai-bubble: #27272a;
    --ai-text: #fafafa;
    --border: #3f3f46;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    transition: background .25s, color .25s;
    overflow: hidden;
  }

  /* ─── Header ─── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 8px;
  }

  .header-left { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
  .bot-name { font-weight: 700; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }

  .header-actions { display: flex; gap: 6px; flex-shrink: 0; }

  .icon-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text);
    transition: background .15s;
  }
  .icon-btn:hover { background: var(--surface); }

  /* ─── Role chips ─── */
  .role-bar {
    display: flex;
    gap: 6px;
    padding: 8px 16px;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    scrollbar-width: none;
  }
  .role-bar::-webkit-scrollbar { display: none; }

  .role-chip {
    flex-shrink: 0;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    font-size: 13px;
    color: var(--subtext);
    transition: all .15s;
    white-space: nowrap;
  }
  .role-chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* ─── Messages area ─── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  /* ─── Empty state ─── */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 24px;
    text-align: center;
  }
  .empty-icon { font-size: 48px; }
  .empty-title { font-size: 18px; font-weight: 600; }
  .empty-sub { font-size: 14px; color: var(--subtext); }
  .chips-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    width: 100%;
    max-width: 340px;
  }
  .starter-chip {
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: var(--surface);
    cursor: pointer;
    font-size: 13px;
    text-align: left;
    color: var(--text);
    transition: background .15s;
    line-height: 1.35;
  }
  .starter-chip:hover { background: var(--border); }

  /* ─── Bubbles ─── */
  .message {
    display: flex;
    flex-direction: column;
    max-width: 78%;
    gap: 4px;
    position: relative;
  }
  .message.user { align-self: flex-end; align-items: flex-end; }
  .message.ai   { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 10px 14px;
    border-radius: var(--radius);
    line-height: 1.55;
    font-size: 15px;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .message.user .bubble {
    background: var(--user-bubble);
    color: var(--user-text);
    border-bottom-right-radius: 4px;
  }
  .message.ai .bubble {
    background: var(--ai-bubble);
    color: var(--ai-text);
    border-bottom-left-radius: 4px;
  }

  .copy-btn {
    opacity: 0;
    transition: opacity .15s;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px 8px;
    font-size: 12px;
    cursor: pointer;
    color: var(--subtext);
    align-self: flex-start;
  }
  .message.ai:hover .copy-btn { opacity: 1; }

  .typing-cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: var(--accent);
    margin-left: 2px;
    vertical-align: middle;
    animation: blink .7s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ─── Input area ─── */
  .input-area {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }

  #userInput {
    flex: 1;
    resize: none;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 14px;
    font-size: 15px;
    font-family: var(--font);
    background: var(--surface);
    color: var(--text);
    outline: none;
    max-height: 120px;
    line-height: 1.4;
    transition: border .15s;
  }
  #userInput:focus { border-color: var(--accent); }
  #userInput::placeholder { color: var(--subtext); }

  #sendBtn, #stopBtn {
    flex-shrink: 0;
    width: 40px;
    height: 40px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: 17px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
  }
  #sendBtn {
    background: var(--accent);
    color: #fff;
  }
  #sendBtn:hover { background: var(--accent-hover); }
  #sendBtn:disabled { opacity: .4; cursor: default; }
  #stopBtn {
    background: #ef4444;
    color: #fff;
    display: none;
  }
  #stopBtn:hover { background: #dc2626; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="status-dot"></span>
    <span class="bot-name">ИИ-Ассистент</span>
  </div>
  <div class="header-actions">
    <button class="icon-btn" id="exportBtn" title="Экспорт чата">💾</button>
    <button class="icon-btn" id="themeBtn" title="Тема">🌙</button>
  </div>
</header>

<div class="role-bar" id="roleBar"></div>

<div id="messages">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">🤖</div>
    <div class="empty-title">Привет! Чем могу помочь?</div>
    <div class="empty-sub">Выберите подсказку или напишите вопрос</div>
    <div class="chips-grid" id="starterChips"></div>
  </div>
</div>

<div class="input-area">
  <textarea id="userInput" placeholder="Напишите сообщение..." rows="1"></textarea>
  <button id="stopBtn" title="Остановить">■</button>
  <button id="sendBtn" title="Отправить">➤</button>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────
const GROQ_API_KEY = "YOUR_GROQ_API_KEY_HERE";
const MODEL = "llama-3.3-70b-versatile";
const API_URL = "https://api.groq.com/openai/v1/chat/completions";

// ─── ROLES ────────────────────────────────────────────────────────
const ROLES = [
  { id: "assistant", label: "🤖 Ассистент",   prompt: "You are a helpful AI assistant. Respond in the same language as the user." },
  { id: "coder",     label: "👨‍💻 Программист", prompt: "You are an expert software developer. Help the user with code, debugging, and architecture. Respond in the same language as the user." },
  { id: "translator",label: "🌐 Переводчик",  prompt: "You are a professional translator. Translate the user's text accurately, preserving tone and meaning. Ask for target language if not specified." },
  { id: "writer",    label: "✍️ Писатель",    prompt: "You are a creative writer. Help the user with creative writing, storytelling, and editing. Respond in the same language as the user." },
  { id: "coach",     label: "💪 Коуч",        prompt: "You are a motivational life coach. Help the user set goals, overcome challenges, and grow. Respond in the same language as the user." },
];

const STARTERS = [
  "Объясни квантовые вычисления простыми словами",
  "Напиши функцию на Python для парсинга JSON",
  "Переведи на английский: 'Привет, как дела?'",
  "Помоги составить план на неделю",
];

// ─── STATE ────────────────────────────────────────────────────────
let history = [];           // [{role, content}]
let currentRole = ROLES[0];
let abortController = null;
let isDark = false;
let userScrolledUp = false;
let isGenerating = false;

// ─── TELEGRAM ─────────────────────────────────────────────────────
const tg = window.Telegram?.WebApp;
tg?.ready();
tg?.expand();

// ─── THEME INIT ───────────────────────────────────────────────────
function applyTheme(dark) {
  isDark = dark;
  document.body.classList.toggle("dark", dark);
  document.getElementById("themeBtn").textContent = dark ? "☀️" : "🌙";
}
// Try to match Telegram theme
if (tg && tg.colorScheme === "dark") applyTheme(true);

document.getElementById("themeBtn").addEventListener("click", () => applyTheme(!isDark));

// ─── ROLES UI ─────────────────────────────────────────────────────
const roleBar = document.getElementById("roleBar");
ROLES.forEach(role => {
  const chip = document.createElement("div");
  chip.className = "role-chip" + (role.id === currentRole.id ? " active" : "");
  chip.textContent = role.label;
  chip.addEventListener("click", () => {
    currentRole = role;
    document.querySelectorAll(".role-chip").forEach(c => c.classList.remove("active"));
    chip.classList.add("active");
    history = [];
    clearMessages();
  });
  roleBar.appendChild(chip);
});

// ─── STARTER CHIPS ────────────────────────────────────────────────
const starterGrid = document.getElementById("starterChips");
STARTERS.forEach(text => {
  const chip = document.createElement("button");
  chip.className = "starter-chip";
  chip.textContent = text;
  chip.addEventListener("click", () => sendMessage(text));
  starterGrid.appendChild(chip);
});

// ─── SCROLL ───────────────────────────────────────────────────────
const messagesDiv = document.getElementById("messages");
messagesDiv.addEventListener("scroll", () => {
  const distFromBottom = messagesDiv.scrollHeight - messagesDiv.scrollTop - messagesDiv.clientHeight;
  userScrolledUp = distFromBottom > 60;
});

function scrollToBottom(force = false) {
  if (!userScrolledUp || force) {
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }
}

// ─── UTILS ────────────────────────────────────────────────────────
function clearMessages() {
  messagesDiv.innerHTML = '';
  const empty = document.createElement("div");
  empty.className = "empty-state";
  empty.id = "emptyState";
  empty.innerHTML = `
    <div class="empty-icon">🤖</div>
    <div class="empty-title">Привет! Чем могу помочь?</div>
    <div class="empty-sub">Выберите подсказку или напишите вопрос</div>
    <div class="chips-grid" id="starterChips"></div>`;
  messagesDiv.appendChild(empty);
  const grid = document.getElementById("starterChips");
  STARTERS.forEach(text => {
    const chip = document.createElement("button");
    chip.className = "starter-chip";
    chip.textContent = text;
    chip.addEventListener("click", () => sendMessage(text));
    grid.appendChild(chip);
  });
}

function removeEmpty() {
  const e = document.getElementById("emptyState");
  if (e) e.remove();
}

function addMessage(role, text) {
  removeEmpty();
  const wrap = document.createElement("div");
  wrap.className = `message ${role}`;

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = text;
  wrap.appendChild(bubble);

  if (role === "ai") {
    const copyBtn = document.createElement("button");
    copyBtn.className = "copy-btn";
    copyBtn.textContent = "📋 Копировать";
    copyBtn.addEventListener("click", () => {
      navigator.clipboard.writeText(bubble.textContent).then(() => {
        copyBtn.textContent = "✅ Скопировано";
        setTimeout(() => copyBtn.textContent = "📋 Копировать", 1500);
      });
    });
    wrap.appendChild(copyBtn);
  }

  messagesDiv.appendChild(wrap);
  scrollToBottom();
  return bubble;
}

// ─── AUTO-RESIZE TEXTAREA ─────────────────────────────────────────
const textarea = document.getElementById("userInput");
textarea.addEventListener("input", () => {
  textarea.style.height = "auto";
  textarea.style.height = Math.min(textarea.scrollHeight, 120) + "px";
});
textarea.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// ─── SEND / STOP ──────────────────────────────────────────────────
document.getElementById("sendBtn").addEventListener("click", () => sendMessage());
document.getElementById("stopBtn").addEventListener("click", () => {
  if (abortController) abortController.abort();
});

function setGenerating(on) {
  isGenerating = on;
  document.getElementById("sendBtn").style.display = on ? "none" : "flex";
  document.getElementById("stopBtn").style.display = on ? "flex" : "none";
  document.getElementById("sendBtn").disabled = on;
  textarea.disabled = on;
}

async function sendMessage(override) {
  const text = override ?? textarea.value.trim();
  if (!text || isGenerating) return;

  textarea.value = "";
  textarea.style.height = "auto";
  userScrolledUp = false;

  addMessage("user", text);
  history.push({ role: "user", content: text });

  setGenerating(true);
  abortController = new AbortController();

  const aiBubble = addMessage("ai", "");
  const cursor = document.createElement("span");
  cursor.className = "typing-cursor";
  aiBubble.appendChild(cursor);
  scrollToBottom();

  let fullText = "";

  try {
    const resp = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${GROQ_API_KEY}`,
      },
      signal: abortController.signal,
      body: JSON.stringify({
        model: MODEL,
        stream: true,
        messages: [
          { role: "system", content: currentRole.prompt },
          ...history,
        ],
      }),
    });

    if (!resp.ok) {
      const err = await resp.text();
      throw new Error(`API error ${resp.status}: ${err}`);
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split("\n");
      buf = lines.pop();
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed || !trimmed.startsWith("data:")) continue;
        const json = trimmed.slice(5).trim();
        if (json === "[DONE]") break;
        try {
          const chunk = JSON.parse(json);
          const delta = chunk.choices?.[0]?.delta?.content ?? "";
          fullText += delta;
          aiBubble.textContent = fullText;
          aiBubble.appendChild(cursor);
          scrollToBottom();
        } catch { /* skip */ }
      }
    }
  } catch (e) {
    if (e.name !== "AbortError") {
      aiBubble.textContent = "⚠️ Ошибка: " + e.message;
    } else {
      // stopped by user — keep partial text
    }
  } finally {
    cursor.remove();
    if (fullText) {
      history.push({ role: "assistant", content: fullText });
    }
    setGenerating(false);
    abortController = null;
    scrollToBottom(true);
  }
}

// ─── EXPORT ───────────────────────────────────────────────────────
document.getElementById("exportBtn").addEventListener("click", () => {
  if (!history.length) { alert("Чат пуст!"); return; }
  const lines = history.map(m => `[${m.role === "user" ? "Вы" : "ИИ"}]\n${m.content}`).join("\n\n---\n\n");
  const blob = new Blob([lines], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `chat_${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>
